name: Sync Upstream

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional upstream tag to sync"
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Detect latest upstream tag
        id: detect
        run: |
          set -euo pipefail

          current_tag="$(jq -r '.upstream.tag' package.json)"
          latest_tag="$(
            git ls-remote --tags --refs https://github.com/mksglu/context-mode.git 'v*' \
              | awk -F/ '{print $3}' \
              | sort -V \
              | tail -n 1
          )"

          if [ -z "$latest_tag" ]; then
            echo "failed to determine latest upstream tag" >&2
            exit 1
          fi

          echo "current_tag=$current_tag" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

          if [ "$current_tag" = "$latest_tag" ]; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package to upstream
        if: github.event_name == 'workflow_dispatch' || steps.detect.outputs.has_update == 'true'
        run: ./scripts/sync-from-upstream.sh "${{ inputs.tag || steps.detect.outputs.latest_tag }}"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.detect.outputs.has_update == 'true'
        run: bun install

      - name: Validate package
        if: github.event_name == 'workflow_dispatch' || steps.detect.outputs.has_update == 'true'
        run: |
          bun run check
          timeout 2 bun ./bin/context-mode-mcp.mjs

      - name: Commit synced update
        if: github.event_name == 'workflow_dispatch' || steps.detect.outputs.has_update == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.latest_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json bun.lock
          git commit -m "chore: sync context-mode-mcp ${VERSION}" || exit 0
          git push origin HEAD:main

      - name: Tag synced release
        if: github.event_name == 'workflow_dispatch' || steps.detect.outputs.has_update == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.latest_tag }}
        run: |
          set -euo pipefail
          git tag "$VERSION"
          git push origin "$VERSION"
